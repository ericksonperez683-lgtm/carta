<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        input[type="text"] {
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            width: 300px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #fff;
            background: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .weather-card.main {
            grid-column: span 1;
        }

        .location-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coordinates {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .temperature-section {
            text-align: center;
            margin: 20px 0;
        }

        .temperature {
            font-size: 64px;
            font-weight: bold;
            margin: 10px 0;
        }

        .weather-description {
            font-size: 20px;
            text-transform: capitalize;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 80px;
            text-align: center;
            margin: 20px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 20px;
            font-weight: bold;
        }

        .forecast-section {
            margin-top: 30px;
        }

        .forecast-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: white;
        }

        .forecast-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .forecast-day {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 30px;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: bold;
        }

        .forecast-temp-range {
            font-size: 12px;
            opacity: 0.8;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid rgba(255, 0, 0, 0.5);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
            }

            input[type="text"] {
                width: 100%;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .temperature {
                font-size: 48px;
            }

            .weather-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name (e.g., London, Paris, Tokyo)" 
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
                <button onclick="getCurrentLocationWeather()" title="Use your location">📍 My Location</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="no-data">
                Enter a city name or use your location to get started 🌍
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '10c62db35bfb427fb0172813242606'; // Free API from weatherapi.com
        const BASE_URL = 'https://api.weatherapi.com/v1';

        const weatherIcons = {
            'Sunny': '☀️',
            'Clear': '🌙',
            'Partly cloudy': '⛅',
            'Cloudy': '☁️',
            'Overcast': '☁️',
            'Mist': '🌫️',
            'Patchy rain': '🌧️',
            'Light rain': '🌧️',
            'Moderate rain': '🌧️',
            'Heavy rain': '⛈️',
            'Thunderstorm': '⛈️',
            'Sleet': '🌨️',
            'Snow': '❄️',
            'Blizzard': '❄️',
            'Fog': '🌫️',
            'Drizzle': '🌧️',
            'Freezing drizzle': '🌧️'
        };

        function getWeatherIcon(description) {
            for (let key in weatherIcons) {
                if (description.includes(key)) {
                    return weatherIcons[key];
                }
            }
            return '🌤️';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function displayWeather(data) {
            const dashboard = document.getElementById('dashboard');
            const current = data.current;
            const forecast = data.forecast.forecastday;

            let html = `
                <div class="weather-card main">
                    <div class="location-name">
                        📍 ${data.location.name}, ${data.location.country}
                    </div>
                    <div class="coordinates">
                        Lat: ${data.location.lat.toFixed(2)}°, Lon: ${data.location.lon.toFixed(2)}°
                    </div>
                    
                    <div class="temperature-section">
                        <div class="weather-icon">${getWeatherIcon(current.condition.text)}</div>
                        <div class="temperature">${current.temp_c}°C</div>
                        <div class="weather-description">${current.condition.text}</div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${current.feelslike_c}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${current.wind_kph} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${current.pressure_mb} mb</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${current.vis_km} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">${current.uv}</div>
                        </div>
                    </div>
                </div>
            `;

            // 3-day forecast
            if (forecast.length > 0) {
                html += `
                    <div class="weather-card" style="grid-column: span 1;">
                        <div class="forecast-title">3-Day Forecast</div>
                        <div class="forecast-cards">
                `;

                forecast.slice(0, 3).forEach(day => {
                    const date = new Date(day.date);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    html += `
                        <div class="forecast-card">
                            <div class="forecast-day">${dayName}</div>
                            <div class="forecast-icon">${getWeatherIcon(day.day.condition.text)}</div>
                            <div class="forecast-temp">${Math.round(day.day.avgtemp_c)}°C</div>
                            <div class="forecast-temp-range">
                                ${day.day.mintemp_c}° / ${day.day.maxtemp_c}°
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            // Additional info card
            html += `
                <div class="weather-card">
                    <div class="forecast-title">Additional Info</div>
                    <div class="weather-details" style="grid-template-columns: 1fr;">
                        <div class="detail-item">
                            <div class="detail-label">Chance of Rain</div>
                            <div class="detail-value">${forecast[0].day.daily_chance_of_rain}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Chance of Snow</div>
                            <div class="detail-value">${forecast[0].day.daily_chance_of_snow}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Max Wind Speed</div>
                            <div class="detail-value">${forecast[0].day.maxwind_kph} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Sunrise</div>
                            <div class="detail-value">${forecast[0].astro.sunrise}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Sunset</div>
                            <div class="detail-value">${forecast[0].astro.sunset}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Moonrise</div>
                            <div class="detail-value">${forecast[0].astro.moonrise}</div>
                        </div>
                    </div>
                </div>
            `;

            dashboard.innerHTML = html;
        }

        async function fetchWeather(query) {
            showLoading(true);
            try {
                const response = await fetch(
                    `${BASE_URL}/forecast.json?key=${API_KEY}&q=${query}&days=3&aqi=no`
                );

                if (!response.ok) {
                    if (response.status === 400) {
                        throw new Error('City not found. Please check the spelling and try again.');
                    } else if (response.status === 403) {
                        throw new Error('API key is invalid.');
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                showError(error.message || 'Failed to fetch weather data. Please try again.');
                console.error('Error:', error);
            } finally {
                showLoading(false);
            }
        }

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                fetchWeather(city);
            } else {
                showError('Please enter a city name.');
            }
        }

        function getCurrentLocationWeather() {
            if (navigator.geolocation) {
                showLoading(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        fetchWeather(`${latitude},${longitude}`);
                    },
                    (error) => {
                        showError('Unable to get your location. Please allow location access or search for a city.');
                        showLoading(false);
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            fetchWeather('London');
        });
    </script>
</body>
</html>
